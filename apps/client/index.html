<!doctype html>
<html lang="en">
<head>
    <!-- Meta Properties -->
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="img/feed.png">
    <title>开放吞噬</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <!-- CSS -->
    <link rel="stylesheet" href="css/main.css" />
    <!-- Audio -->
    <audio id="split_cell" src="audio/split.mp3"></audio>
    <audio id="spawn_cell" src="audio/spawn.mp3"></audio>
</head>
<body>
    <div id="gameAreaWrapper" style="opacity: 1;">
        <div id="status"><span class="title">排行榜</span></div>
        <div id="playerCardHud"></div>
        <div id="targetCardHud"></div>
        <div class="chatbox" id="chatbox">
            <ul id="chatList" class="chat-list"></ul>
            <input id="chatInput" type="text" class="chat-input" placeholder="Chat here..." maxlength="35" />
        </div>
        <div id="mobile">
           <input type="image" id="split" class="split" src="img/split.png" alt="splitBtn">
           <input type="image" id="feed" class="feed" src="img/feed.png" alt="feedBtn">
        </div>
        <canvas tabindex="1" id="cvs"></canvas>
    </div>
    <div id="startMenuWrapper" style="max-height: 1000px;">
        <div id="startMenu">
            <button id="languageToggleButton" type="button">English</button>
            <p data-i18n="startMenu.title">开放吞噬</p>
            <input type="text" tabindex="0" autofocus placeholder="请输入你的名字" id="playerNameInput" maxlength="25" />
            <b class="input-error" data-i18n="startMenu.invalidName">昵称只能包含字母、数字或下划线</b>
            <br />
            <label class="record-consent-row"><input id="recordConsentInput" type="checkbox" checked><span data-i18n="startMenu.recordConsent">同意录制本局用于历史回响</span></label>
            <br />
            <a onclick="document.getElementById('spawn_cell').play();"><button id="startButton" data-i18n="startMenu.play">开始游戏</button></a>
            <button id="spectateButton" data-i18n="startMenu.spectate">观战</button>
            <button id="paintCardButton" data-i18n="startMenu.drawCard">绘制名片</button>
            <button id="settingsButton" data-i18n="startMenu.settings">设置</button>
            <br />
            <div id="playerCardStartPreview"></div>
            <div id="settings">
                <h3 data-i18n="startMenu.settings">设置</h3>
                <ul>
                    <label><input id="visBord" type="checkbox"><span data-i18n="settings.showBorder">显示边界</span></label>
                    <label><input id="showMass" type="checkbox"><span data-i18n="settings.showMass">显示质量</span></label>
                    <br />
                    <label><input id="continuity" type="checkbox"><span data-i18n="settings.continuity">鼠标离开屏幕后继续移动</span></label>
                    <br />
                    <label><input id="roundFood" type="checkbox" checked><span data-i18n="settings.roundFood">圆形食物</span></label>
                    <label><input id="darkMode" type="checkbox"><span data-i18n="settings.darkMode">切换深色模式</span></label>
                </ul>
            </div>
            <div id="instructions">
                <h3 data-i18n="startMenu.gameplay">玩法说明</h3>
                <ul>
                    <li data-i18n="startMenu.instructions.move">用鼠标在屏幕上移动角色。</li>
                    <li data-i18n="startMenu.instructions.eat">吃食物和其他玩家来成长（吃掉食物后会刷新新的食物）。</li>
                    <li data-i18n="startMenu.instructions.mass">角色质量由吃下的食物数量决定。</li>
                    <li data-i18n="startMenu.instructions.goal">目标：尽可能长大并吞噬其他玩家。</li>
                </ul>
            </div>
        </div>
        <div id="bodySignaturePanel">
            <div class="body-signature-panel-inner">
                <div class="body-signature-copy">
                    <span id="bodySignatureMissingLabel" class="body-signature-kicker">缺失部位：手</span>
                    <h3 id="bodySignatureTitle">画下你的手部签名</h3>
                    <p id="bodySignatureSubtitle">参考任意一个回声，用一笔或多笔画出你想装上的手。</p>
                </div>
                <div class="body-signature-character">
                    <img id="bodySignatureBodyImage" src="img/body-signature/body-base-missing-right-arm.png" alt="" />
                </div>
                <div id="bodySignatureRefs" class="body-signature-refs"></div>
                <div class="body-signature-canvas-shell">
                    <canvas id="bodySignatureCanvas" width="280" height="280"></canvas>
                </div>
                <div id="bodySignatureMessage" class="body-signature-message">画完后提交，系统会给出相似度档位。</div>
                <div class="body-signature-actions">
                    <button id="bodySignatureClearButton" type="button">清空</button>
                    <button id="bodySignatureSubmitButton" type="button">提交签名</button>
                    <button id="bodySignatureSkipButton" type="button">跳过</button>
                </div>
            </div>
        </div>
        <div id="playerCardPanel">
            <div class="player-card-panel-inner">
                <h3 id="playerCardPanelTitle">绘制你的名片</h3>
                <div id="avatarDraftPanel" class="avatar-draft-panel">
                    <div class="avatar-draft-header">
                        <div id="avatarDraftTimer"></div>
                        <div id="avatarDraftHint"></div>
                    </div>
                    <div id="avatarDraftCandidates"></div>
                    <div class="avatar-draft-actions">
                        <button id="avatarDraftRerollButton" type="button">重抽</button>
                        <button id="avatarDraftSkipButton" type="button">跳过</button>
                    </div>
                </div>
                <div class="player-card-layer-bar">
                    <button id="toggleAdvancedLayersButton" class="player-card-layer-toggle-button" type="button">高级图层</button>
                    <div id="playerCardLayerPanel" class="player-card-layer-panel hidden">
                        <span id="playerCardLayerLabel" class="player-card-layer-label">图层</span>
                        <div class="player-card-layer-buttons">
                            <div class="player-card-layer-row">
                                <button id="layerBaseButton" type="button">Base</button>
                                <button id="layerBaseVisibilityButton" type="button">显示</button>
                                <button id="layerBaseLockButton" type="button">锁定</button>
                            </div>
                            <div class="player-card-layer-row">
                                <button id="layerEyesButton" type="button">Eyes</button>
                                <button id="layerEyesVisibilityButton" type="button">显示</button>
                                <button id="layerEyesLockButton" type="button">锁定</button>
                            </div>
                            <div class="player-card-layer-row">
                                <button id="layerHairButton" type="button">Hair</button>
                                <button id="layerHairVisibilityButton" type="button">显示</button>
                                <button id="layerHairLockButton" type="button">锁定</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="player-card-toolbar">
                    <button id="selectToolButton" type="button">选择</button>
                    <button id="drawToolButton" type="button">画笔</button>
                    <button id="rectToolButton" type="button">矩形</button>
                    <button id="circleToolButton" type="button">圆形</button>
                    <button id="lineToolButton" type="button">直线</button>
                    <button id="textToolButton" type="button">文字</button>
                    <button id="eraseToolButton" type="button">橡皮</button>
                    <button id="undoCardButton" type="button">撤销</button>
                    <button id="redoCardButton" type="button">重做</button>
                    <button id="clearCardButton" type="button">清空</button>
                    <button id="saveCardButton" type="button">保存</button>
                    <button id="exportPngButton" type="button">导出 PNG</button>
                    <button id="exportJsonButton" type="button">导出 JSON</button>
                    <button id="closeCardPanelButton" type="button">关闭</button>
                </div>
                <div class="player-card-controls">
                    <label><span id="strokeLabel">描边</span> <input id="cardStrokeColor" type="color" value="#111111"></label>
                    <label><span id="fillLabel">填充</span> <input id="cardFillColor" type="color" value="#f2fbff"></label>
                    <label><span id="sizeLabel">粗细</span> <input id="cardBrushSize" type="range" min="2" max="24" value="6"></label>
                </div>
                <div id="playerCardDraftManager" class="player-card-draft-manager">
                    <div class="player-card-draft-actions-row">
                        <button id="newDraftImageButton" type="button">新建图片</button>
                        <button id="saveDraftImageButton" type="button">保存到草稿</button>
                        <button id="toggleDraftHistoryButton" type="button">历史草稿</button>
                    </div>
                    <div id="playerCardDraftHistory" class="player-card-draft-history">
                        <div id="playerCardDraftEmpty" class="player-card-draft-empty">还没有草稿</div>
                        <div id="playerCardDraftList" class="player-card-draft-list"></div>
                    </div>
                </div>
                <div class="player-card-zoom-controls">
                    <button id="zoomOutCardButton" type="button">缩小</button>
                    <button id="zoomInCardButton" type="button">放大</button>
                </div>
                <div id="playerCardPanelMessage"></div>
                <div class="player-card-canvas-shell">
                    <canvas id="playerCardCanvas" width="320" height="320"></canvas>
                </div>
            </div>
        </div>
    </div>
    <!-- JS -->
    <script src="//code.jquery.com/jquery-2.2.0.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
